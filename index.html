<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solution By Idea</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f8fafc; /* ලස්සන soft off-white background එකක් */
            color: #334155;
        }

        /* 1. ලස්සන Navbar එකක් */
        header {
            background-color: #0f172a; /* Dark Blue / Black Navy */
            padding: 20px 0;
        }

        .navbar {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #cbd5e1;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: white;
        }

        /* 2. Modern Hero Section */
        .hero-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 100px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 60px;
        }

        .hero-text {
            flex: 1.2;
        }

        .hero-text h1 {
            color: #0f172a;
            font-size: 48px;
            line-height: 1.2;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero-text p {
            font-size: 16px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* 3. Modern Buttons */
        .hero-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-primary {
            background-color: #2563eb; /* Modern Blue */
            color: white;
            padding: 14px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px); /* උඩට පොඩ්ඩක් lift වෙනවා */
        }

        .btn-secondary {
            background-color: #e2e8f0;
            color: #1e293b;
            padding: 14px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
        }

        .btn-secondary:hover {
            background-color: #cbd5e1;
            transform: translateY(-2px);
        }

        /* 4. Right side illustration wrapper */
        .hero-image {
            flex: 0.8;
            display: flex;
            justify-content: center;
        }

        .hero-image svg {
            width: 100%;
            max-width: 300px;
            height: auto;
        }

        /* Responsive - Phone වලටත් ලස්සන වෙන්න */
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
            .hero-section {
                flex-direction: column;
                text-align: center;
                padding: 50px 20px;
            }
            .hero-text h1 {
                font-size: 32px;
            }
            .hero-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
     <div class="hero-image">
    <svg width="350" height="350" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0px 10px 20px rgba(37, 99, 235, 0.15));">
        <path d="M9 21H15M10 18H14M12 2C7.58172 2 4 5.58172 4 10C4 12.3969 5.04835 14.5491 6.70273 16H17.2973C18.9517 14.5491 20 12.3969 20 10C20 5.58172 16.4183 2 12 2Z" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 6V10M10 8H14" stroke="#2563eb" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
</div>
    </header>
    <main class="hero-section">
        <div class="hero-text">
            <h1>Smart Technology Solutions For Modern Businesses</h1>
            <p>We help businesses and individuals grow through innovative technology, web development, management strategies, sales optimization, and digital marketing solutions.</p>
            <div class="hero-buttons">
                <a href="#" class="btn-primary">Our Services</a>
                <a href="#" class="btn-secondary">Contact Us</a>
            </div>
        </div>
        
        <div class="hero-image">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 21H15M10 18H14M12 2C7.58172 2 4 5.58172 4 10C4 12.3969 5.04835 14.5491 6.70273 16H17.2973C18.9517 14.5491 20 12.3969 20 10C20 5.58172 16.4183 2 12 2Z" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 6V10M10 8H14" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </main>
    </body>
</html>
